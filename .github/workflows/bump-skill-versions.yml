name: bump-skill-versions

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # skip commits made by this workflow
    if: github.event.head_commit.author.name != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed skills and bump patch versions
        run: |
          changed_skills=$(git diff --name-only HEAD~1 HEAD -- skills/ \
            | cut -d/ -f2 | sort -u)

          if [ -z "$changed_skills" ]; then
            echo "No skill directories changed."
            exit 0
          fi

          echo "Changed skills: $changed_skills"
          echo "$changed_skills" | python3 -c "
          import json, sys

          skills = [s.strip() for s in sys.stdin if s.strip()]
          path = '.claude-plugin/marketplace.json'

          with open(path) as f:
              data = json.load(f)

          changed = False
          for plugin in data['plugins']:
              if plugin['name'] in skills:
                  old = plugin['version']
                  parts = old.split('.')
                  if len(parts) != 3 or not parts[2].isdigit():
                      print(f'  {plugin[\"name\"]}: skipping malformed version \"{old}\"')
                      continue
                  parts[2] = str(int(parts[2]) + 1)
                  plugin['version'] = '.'.join(parts)
                  print(f'  {plugin[\"name\"]}: {old} -> {plugin[\"version\"]}')
                  changed = True

          if changed:
              with open(path, 'w') as f:
                  json.dump(data, f, indent=2)
                  f.write('\n')
          "

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet .claude-plugin/marketplace.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump skill patch versions for changed skills"
          git push
