name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync

      - name: Lint all skills
        run: uv run scripts/validate_skill.py skills

      - name: Run tests
        run: uv run pytest -v
