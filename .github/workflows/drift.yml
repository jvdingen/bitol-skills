name: upstream-checks

# Daily upstream checks, two layers:
#
#   1. drift    — sync_specs.py in plan mode: have the *pinned* refs' files
#                 diverged from what we vendored? (Rare: tags are immutable.)
#   2. releases — check_releases.py: has any upstream repo tagged a release
#                 newer than the refs pinned in sources.toml? This is the check
#                 that notices a new ODCS/ODPS version, since pinned tags never
#                 drift on their own.
#
# Either finding opens (or updates) a tracking issue so a human can run the
# update workflow documented in CLAUDE.md. Also runnable on demand via
# workflow_dispatch.

on:
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync

      - name: Run sync_specs in plan mode
        id: drift
        run: |
          set +e
          uv run scripts/sync_specs.py skills | tee drift-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Check for new upstream releases
        id: releases
        run: |
          set +e
          uv run scripts/check_releases.py skills | tee release-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open / update drift issue
        if: steps.drift.outputs.exit_code != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift-report.txt', 'utf8');
            const title = 'Upstream drift detected by daily check';
            const body = [
              'The daily drift check found that one or more vendored references',
              'have diverged from their declared upstream refs.',
              '',
              '```',
              report,
              '```',
              '',
              'To resolve:',
              '1. Review the diff with `uv run scripts/sync_specs.py skills`',
              '2. Decide whether the change is mechanical or semantic',
              '3. `uv run scripts/sync_specs.py skills --apply` to write changes',
              '4. If a new spec version is now in scope, append it to the skill\'s `metadata.spec_versions`',
              '5. Update the SKILL.md body if semantics changed',
              '6. Run `uv run scripts/validate_skill.py skills && uv run pytest`',
              '',
              `Triggered by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
            });
            const open = existing.data.find(i => i.title === title);
            if (open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['drift'],
              });
            }

      - name: Open / update new-release issue
        if: steps.releases.outputs.exit_code == '1'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('release-report.txt', 'utf8');
            const title = 'New upstream release(s) available';
            const body = [
              'The daily release check found upstream tags newer than the refs',
              'pinned in one or more skills\' `sources.toml`.',
              '',
              '```',
              report,
              '```',
              '',
              'To update a skill (see CLAUDE.md drift workflow for detail):',
              '1. Read the upstream CHANGELOG for the new version',
              '2. Add/retarget `[[source]]` entries in the skill\'s `sources.toml` to the new tag',
              '3. `uv run scripts/sync_specs.py skills/<name> --apply`',
              '4. Append the new version to `metadata.spec_versions` and the `description`',
              '5. Update the SKILL.md body (version differences, pitfalls) if semantics changed',
              '6. Run `uv run scripts/validate_skill.py skills && uv run pytest`',
              '',
              `Triggered by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'new-release',
            });
            const open = existing.data.find(i => i.title === title);
            if (open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['new-release'],
              });
            }

      - name: Fail the job if anything was detected
        if: steps.drift.outputs.exit_code != '0' || steps.releases.outputs.exit_code != '0'
        run: exit 1
