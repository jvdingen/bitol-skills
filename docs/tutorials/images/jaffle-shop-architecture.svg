<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0969da"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8250df"/>
    </marker>
  </defs>

  <!-- opaque background so the diagram reads identically on light and dark pages -->
  <rect x="0" y="0" width="1080" height="640" rx="12" fill="#ffffff" stroke="#d0d7de"/>

  <text x="40" y="44" font-size="20" font-weight="600" fill="#1f2328">The jaffle shop, three standards deep</text>
  <text x="40" y="66" font-size="13" fill="#57606a">data plane (top) · ODCS contracts describe each dataset · the ODPS product bundles the contracts</text>

  <!-- ======================= DATA PLANE ======================= -->
  <!-- Seeds -->
  <g>
    <rect x="40" y="96" width="200" height="176" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="140" y="120" font-size="13" font-weight="600" fill="#57606a" text-anchor="middle">seeds/ (CSV)</text>
    <g font-size="12.5" fill="#1f2328">
      <rect x="56" y="132" width="168" height="30" rx="6" fill="#ffffff" stroke="#d0d7de"/>
      <text x="140" y="151" text-anchor="middle">raw_customers.csv</text>
      <rect x="56" y="170" width="168" height="30" rx="6" fill="#ffffff" stroke="#d0d7de"/>
      <text x="140" y="189" text-anchor="middle">raw_orders.csv</text>
      <rect x="56" y="208" width="168" height="30" rx="6" fill="#ffffff" stroke="#d0d7de"/>
      <text x="140" y="227" text-anchor="middle">raw_payments.csv</text>
    </g>
  </g>

  <!-- load arrow -->
  <line x1="240" y1="184" x2="296" y2="184" stroke="#57606a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="268" y="172" font-size="11.5" fill="#57606a" text-anchor="middle">load</text>

  <!-- DuckDB -->
  <g>
    <rect x="300" y="96" width="740" height="176" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="670" y="120" font-size="13" font-weight="600" fill="#57606a" text-anchor="middle">DuckDB — jaffle_shop.duckdb (schema: main)</text>

    <!-- raw tables -->
    <g font-size="12.5" fill="#1f2328">
      <text x="416" y="146" font-size="11.5" font-weight="600" fill="#57606a" text-anchor="middle">RAW LAYER</text>
      <rect x="332" y="154" width="168" height="26" rx="6" fill="#ffffff" stroke="#d0d7de"/>
      <text x="416" y="171" text-anchor="middle">raw_customers</text>
      <rect x="332" y="188" width="168" height="26" rx="6" fill="#ffffff" stroke="#d0d7de"/>
      <text x="416" y="205" text-anchor="middle">raw_orders</text>
      <rect x="332" y="222" width="168" height="26" rx="6" fill="#ffffff" stroke="#d0d7de"/>
      <text x="416" y="239" text-anchor="middle">raw_payments</text>
    </g>

    <!-- transform arrow -->
    <line x1="510" y1="200" x2="806" y2="200" stroke="#57606a" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="658" y="188" font-size="11.5" fill="#57606a" text-anchor="middle">setup_jaffle_shop.sql — SQL transforms</text>

    <!-- marts -->
    <g font-size="12.5" fill="#1f2328">
      <text x="912" y="146" font-size="11.5" font-weight="600" fill="#57606a" text-anchor="middle">MART LAYER</text>
      <rect x="828" y="160" width="168" height="30" rx="6" fill="#ffffff" stroke="#d0d7de"/>
      <text x="912" y="179" text-anchor="middle" font-weight="600">orders</text>
      <rect x="828" y="204" width="168" height="30" rx="6" fill="#ffffff" stroke="#d0d7de"/>
      <text x="912" y="223" text-anchor="middle" font-weight="600">customers</text>
    </g>
  </g>

  <!-- ======================= "described by" arrows (contract -> dataset) ======================= -->
  <line x1="416" y1="330" x2="416" y2="278" stroke="#0969da" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow-blue)"/>
  <text x="424" y="308" font-size="11.5" fill="#0969da">described by</text>
  <line x1="700" y1="330" x2="866" y2="196" stroke="#0969da" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow-blue)"/>
  <line x1="916" y1="436" x2="912" y2="240" stroke="#0969da" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow-blue)"/>

  <!-- ======================= ODCS CONTRACTS ======================= -->
  <g font-size="12.5">
    <!-- raw contract -->
    <rect x="292" y="334" width="248" height="82" rx="8" fill="#ddf4ff" stroke="#54aeff"/>
    <text x="416" y="356" text-anchor="middle" font-weight="600" fill="#0969da">jaffle-shop-raw.odcs.yaml</text>
    <text x="416" y="376" text-anchor="middle" fill="#0969da">ODCS v3.1.0 · 3 objects</text>
    <text x="416" y="394" text-anchor="middle" fill="#0969da">FK relationships · quality</text>
    <text x="416" y="410" text-anchor="middle" font-size="11" fill="#57606a">id: 8c45d6b0-…2920</text>

    <!-- orders contract (tutorial 1) -->
    <rect x="576" y="334" width="248" height="82" rx="8" fill="#ddf4ff" stroke="#54aeff"/>
    <text x="700" y="356" text-anchor="middle" font-weight="600" fill="#0969da">orders.odcs.yaml</text>
    <text x="700" y="376" text-anchor="middle" fill="#0969da">schema · quality · SLA · duckdb server</text>
    <text x="700" y="394" text-anchor="middle" fill="#0969da">written by hand — tutorial 1</text>
    <text x="700" y="410" text-anchor="middle" font-size="11" fill="#57606a">id: 8f8e7b5a-…034b</text>

    <!-- customers contract (tutorial 2) -->
    <rect x="792" y="440" width="248" height="82" rx="8" fill="#ddf4ff" stroke="#54aeff"/>
    <text x="916" y="462" text-anchor="middle" font-weight="600" fill="#0969da">customers.odcs.yaml</text>
    <text x="916" y="482" text-anchor="middle" fill="#0969da">generated from the DuckDB catalog</text>
    <text x="916" y="500" text-anchor="middle" fill="#0969da">by Python — tutorial 2</text>
    <text x="916" y="516" text-anchor="middle" font-size="11" fill="#57606a">id: 7fb49248-…2e84</text>
  </g>

  <!-- ======================= ODPS PRODUCT ======================= -->
  <g font-size="12.5">
    <rect x="40" y="446" width="700" height="150" rx="8" fill="#fbefff" stroke="#c297ff"/>
    <text x="60" y="472" font-weight="600" font-size="14" fill="#8250df">jaffle_shop.odps.yaml — ODPS v1.0.0 data product (tutorial 3)</text>
    <text x="60" y="492" fill="#8250df">ports are references: each one points at a contract by contractId</text>

    <!-- port chips, one row of data ports -->
    <rect x="60" y="506" width="200" height="34" rx="17" fill="#ffffff" stroke="#c297ff"/>
    <text x="160" y="527" text-anchor="middle" fill="#8250df">input port: jaffle-shop-raw</text>
    <rect x="280" y="506" width="180" height="34" rx="17" fill="#ffffff" stroke="#c297ff"/>
    <text x="370" y="527" text-anchor="middle" fill="#8250df">output port: orders</text>
    <rect x="480" y="506" width="200" height="34" rx="17" fill="#ffffff" stroke="#c297ff"/>
    <text x="580" y="527" text-anchor="middle" fill="#8250df">output port: customers</text>

    <!-- management port on its own row -->
    <rect x="60" y="550" width="290" height="34" rx="17" fill="#ffffff" stroke="#c297ff"/>
    <text x="205" y="571" text-anchor="middle" fill="#8250df">management port: observability (REST)</text>
  </g>

  <!-- contractId arrows: ports -> contracts (from the box edge, above each chip) -->
  <path d="M 160 446 C 220 436, 290 428, 340 421" fill="none" stroke="#8250df" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow-purple)"/>
  <path d="M 370 446 C 450 436, 560 430, 646 421" fill="none" stroke="#8250df" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow-purple)"/>
  <path d="M 580 446 C 660 446, 716 466, 786 481" fill="none" stroke="#8250df" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow-purple)"/>

  <!-- legend -->
  <g font-size="11.5">
    <line x1="792" y1="560" x2="824" y2="560" stroke="#57606a" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="830" y="564" fill="#57606a">data flow</text>
    <line x1="792" y1="584" x2="824" y2="584" stroke="#0969da" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="830" y="588" fill="#0969da">described by (ODCS contract)</text>
    <line x1="792" y1="608" x2="824" y2="608" stroke="#8250df" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="830" y="612" fill="#8250df">references (ODPS contractId)</text>
  </g>
</svg>
